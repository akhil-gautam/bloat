# Example bloat plugins.toml
# Copy to ~/.config/bloat/plugins.toml to activate.
# Each [[panel]] block defines a monitoring panel shown in the System tab.

# Redis monitoring
[[panel]]
name = "Redis"
command = "redis-cli info memory 2>/dev/null | grep -E 'used_memory_human|connected_clients|blocked_clients' || echo 'Redis not running'"
interval = 5
position = "right"
color = "red"

# Postgres connections
[[panel]]
name = "Postgres"
command = "psql -c 'SELECT count(*) as connections FROM pg_stat_activity;' -t 2>/dev/null || echo 'PG not running'"
interval = 10
position = "right"
color = "blue"

# Docker containers
[[panel]]
name = "Docker"
command = "docker ps --format '{{.Names}}\t{{.Status}}\t{{.Ports}}' 2>/dev/null | head -5 || echo 'Docker not running'"
interval = 10
position = "left"
color = "cyan"

# Ollama models
[[panel]]
name = "Ollama"
command = "curl -s localhost:11434/api/tags 2>/dev/null | python3 -c 'import sys,json; [print(m[\"name\"]) for m in json.load(sys.stdin).get(\"models\",[])]' || echo 'Ollama not running'"
interval = 30
position = "right"
color = "magenta"

# Git status of current project
[[panel]]
name = "Git"
command = "cd ~/projects && for d in */; do echo \"$d$(cd $d && git status --short 2>/dev/null | wc -l | tr -d ' ') changes\"; done | head -5"
interval = 30
position = "left"
color = "green"
