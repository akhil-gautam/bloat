name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build macOS binaries
    runs-on: macos-latest
    env:
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build for Apple Silicon (arm64)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build for Intel (x86_64)
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/bloat \
            target/x86_64-apple-darwin/release/bloat \
            -output bloat-universal

      - name: Package binaries
        run: |
          # Universal binary (recommended)
          cp bloat-universal bloat
          tar -czf "bloat-${TAG_NAME}-macos-universal.tar.gz" bloat

          # ARM64 only
          cp target/aarch64-apple-darwin/release/bloat bloat
          tar -czf "bloat-${TAG_NAME}-macos-arm64.tar.gz" bloat

          # x86_64 only
          cp target/x86_64-apple-darwin/release/bloat bloat
          tar -czf "bloat-${TAG_NAME}-macos-x86_64.tar.gz" bloat

      - name: Generate SHA256 checksums
        run: |
          shasum -a 256 bloat-${TAG_NAME}-*.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bloat-*.tar.gz
            checksums.txt
